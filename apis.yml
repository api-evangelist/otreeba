description: >-
  Open Cannabis Data for Your Technology. Otreeba comes from the word "abierto"
  which means "open." Otreeba offers standardized cannabis data and normalization
  for cannabis seed companies, strains, brands, products, batches, retailers, and
  studies through a REST API.
